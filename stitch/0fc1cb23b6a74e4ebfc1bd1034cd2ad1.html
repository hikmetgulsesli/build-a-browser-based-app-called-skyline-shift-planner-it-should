<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Skyline Shift Planner - Lead Ekle</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#93000a",
                        "surface-bright": "#faf8ff",
                        "on-primary": "#ffffff",
                        "surface-variant": "#e1e2ed",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#ededf9",
                        "on-tertiary-fixed": "#360f00",
                        "on-error": "#ffffff",
                        "primary-fixed": "#dbe1ff",
                        "on-primary-fixed": "#00174b",
                        "surface-container-high": "#e7e7f3",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-primary-container": "#eeefff",
                        "inverse-primary": "#b4c5ff",
                        "on-tertiary-container": "#ffede6",
                        "surface-container-highest": "#e1e2ed",
                        "background": "#faf8ff",
                        "on-secondary-fixed": "#0d1c2e",
                        "secondary": "#515f74",
                        "secondary-container": "#d5e3fc",
                        "surface-tint": "#0053db",
                        "on-secondary-container": "#57657a",
                        "on-primary-fixed-variant": "#003ea8",
                        "secondary-fixed": "#d5e3fc",
                        "on-surface": "#191b23",
                        "primary": "#004ac6",
                        "tertiary-fixed": "#ffdbcd",
                        "primary-container": "#2563eb",
                        "tertiary-container": "#bc4800",
                        "on-secondary-fixed-variant": "#3a485b",
                        "on-surface-variant": "#434655",
                        "tertiary-fixed-dim": "#ffb596",
                        "outline": "#737686",
                        "inverse-surface": "#2e3039",
                        "surface": "#faf8ff",
                        "surface-container-low": "#f3f3fe",
                        "on-background": "#191b23",
                        "inverse-on-surface": "#f0f0fb",
                        "surface-dim": "#d9d9e5",
                        "on-secondary": "#ffffff",
                        "tertiary": "#943700",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#b9c7df",
                        "outline-variant": "#c3c6d7",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "32px",
                        "gutter": "16px",
                        "container-margin": "24px",
                        "sm": "8px",
                        "base-unit": "4px",
                        "md": "16px",
                        "2xl": "48px",
                        "lg": "24px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "h2-header": ["Inter"],
                        "data-tabular": ["Inter"],
                        "body-base": ["Inter"],
                        "h3-subhead": ["Inter"],
                        "label-bold": ["Inter"],
                        "body-large": ["Inter"],
                        "h1-display": ["Inter"],
                        "body-small": ["Inter"]
                    },
                    "fontSize": {
                        "h2-header": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "data-tabular": ["13px", { "lineHeight": "18px", "fontWeight": "500" }],
                        "body-base": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "h3-subhead": ["18px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-bold": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "body-large": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "h1-display": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-small": ["12px", { "lineHeight": "16px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background min-h-screen w-full flex items-center justify-center p-md md:p-container-margin font-body-base text-body-base text-on-surface">
<!-- Modal/Form Container -->
<div class="w-full max-w-2xl bg-surface-container-lowest rounded-xl border border-outline-variant shadow-[0_4px_24px_rgba(15,23,42,0.08)] flex flex-col overflow-hidden">
<!-- Header -->
<div class="flex items-center justify-between px-lg py-md border-b border-outline-variant bg-surface">
<div>
<h1 class="font-h2-header text-h2-header text-on-surface">Yeni Lead Ekle</h1>
<p class="font-body-small text-body-small text-on-surface-variant mt-xs">Operasyonel personel kaydı oluşturun.</p>
</div>
<button class="text-on-surface-variant hover:text-on-surface transition-colors focus:outline-none focus:ring-2 focus:ring-primary rounded-full p-xs" type="button">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Form Body -->
<div class="p-lg flex flex-col gap-lg">
<!-- Ad Soyad Field (with error state demonstration) -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface" for="adSoyad">Ad Soyad</label>
<div class="relative">
<input aria-describedby="adSoyad-error" aria-invalid="true" class="w-full bg-surface-container-low border border-error text-on-surface font-body-base text-body-base rounded-DEFAULT px-sm py-xs h-10 focus:outline-none focus:border-error focus:ring-1 focus:ring-error transition-colors pr-10" id="adSoyad" name="adSoyad" type="text" value="Ahmet Yıl"/>
<div class="absolute inset-y-0 right-0 flex items-center pr-sm pointer-events-none text-error">
<span class="material-symbols-outlined text-[20px]">error</span>
</div>
</div>
<p class="font-body-small text-body-small text-error" id="adSoyad-error">Lütfen geçerli bir tam ad giriniz.</p>
</div>
<!-- Row for Üs and Rol -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Üs (Base) Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface" for="usBase">Üs (Base)</label>
<div class="relative">
<select class="w-full bg-surface-container-low border border-outline-variant text-on-surface font-body-base text-body-base rounded-DEFAULT pl-sm pr-10 py-xs h-10 appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors cursor-pointer" id="usBase" name="usBase">
<option disabled="" selected="" value="">Seçiniz</option>
<option value="IST">İstanbul (IST)</option>
<option value="SAW">Sabiha Gökçen (SAW)</option>
<option value="ESB">Ankara (ESB)</option>
<option value="ADB">İzmir (ADB)</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center pr-sm pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">arrow_drop_down</span>
</div>
</div>
</div>
<!-- Rol Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface" for="rol">Rol</label>
<div class="relative">
<select class="w-full bg-surface-container-low border border-outline-variant text-on-surface font-body-base text-body-base rounded-DEFAULT pl-sm pr-10 py-xs h-10 appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors cursor-pointer" id="rol" name="rol">
<option disabled="" selected="" value="">Seçiniz</option>
<option value="kaptan">Kaptan Pilot</option>
<option value="yardimci">Yardımcı Pilot</option>
<option value="kabin_amiri">Kabin Amiri</option>
<option value="kabin_memuru">Kabin Memuru</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center pr-sm pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">arrow_drop_down</span>
</div>
</div>
</div>
</div>
<!-- Durum Field -->
<div class="flex flex-col gap-xs w-full md:w-1/2 md:pr-sm">
<label class="font-label-bold text-label-bold text-on-surface" for="durum">Durum</label>
<div class="relative">
<select class="w-full bg-surface-container-low border border-outline-variant text-on-surface font-body-base text-body-base rounded-DEFAULT pl-sm pr-10 py-xs h-10 appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors cursor-pointer" id="durum" name="durum">
<option selected="" value="aktif">Aktif</option>
<option value="izinli">İzinli</option>
<option value="egitimde">Eğitimde</option>
<option value="raporlu">Raporlu</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center pr-sm pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">arrow_drop_down</span>
</div>
</div>
</div>
<!-- Notlar Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface" for="notlar">Notlar</label>
<textarea class="w-full bg-surface-container-low border border-outline-variant text-on-surface font-body-base text-body-base rounded-DEFAULT px-sm py-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors resize-y" id="notlar" name="notlar" placeholder="Personel hakkında eklemek istediğiniz notlar..." rows="4"></textarea>
</div>
</div>
<!-- Footer / Actions -->
<div class="px-lg py-md border-t border-outline-variant bg-surface-container flex items-center justify-end gap-md">
<button class="font-data-tabular text-data-tabular text-on-surface bg-transparent border border-outline hover:bg-surface-container-high px-md py-xs h-10 rounded-DEFAULT transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1 focus:ring-offset-surface-container" type="button">
                İptal
            </button>
<button class="font-data-tabular text-data-tabular text-on-primary bg-primary hover:bg-primary-container hover:text-on-primary-container border border-transparent px-md py-xs h-10 rounded-DEFAULT transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1 focus:ring-offset-surface-container flex items-center gap-xs" type="submit">
<span class="material-symbols-outlined text-[18px]">save</span>
                Kaydet
            </button>
</div>
</div>
</body></html>
