<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yeni Lead Ekle - Skyline Ops</title>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<!-- Tailwind CSS with custom configuration -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary": "#ffffff",
                    "inverse-on-surface": "#f0f0fb",
                    "on-surface-variant": "#434655",
                    "secondary": "#515f74",
                    "surface-bright": "#faf8ff",
                    "primary-container": "#2563eb",
                    "error-container": "#ffdad6",
                    "error": "#ba1a1a",
                    "on-surface": "#191b23",
                    "secondary-fixed-dim": "#b9c7df",
                    "surface-container-low": "#f3f3fe",
                    "tertiary-fixed": "#ffdbcd",
                    "on-tertiary-container": "#ffede6",
                    "surface-variant": "#e1e2ed",
                    "tertiary-fixed-dim": "#ffb596",
                    "on-background": "#191b23",
                    "primary-fixed": "#dbe1ff",
                    "on-error": "#ffffff",
                    "secondary-container": "#d5e3fc",
                    "primary": "#004ac6",
                    "tertiary-container": "#bc4800",
                    "surface-container": "#ededf9",
                    "outline-variant": "#c3c6d7",
                    "on-tertiary-fixed-variant": "#7d2d00",
                    "on-primary-fixed": "#00174b",
                    "secondary-fixed": "#d5e3fc",
                    "background": "#faf8ff",
                    "surface-container-highest": "#e1e2ed",
                    "tertiary": "#943700",
                    "inverse-surface": "#2e3039",
                    "on-secondary-fixed": "#0d1c2e",
                    "on-secondary": "#ffffff",
                    "on-error-container": "#93000a",
                    "surface": "#faf8ff",
                    "surface-container-high": "#e7e7f3",
                    "inverse-primary": "#b4c5ff",
                    "on-secondary-fixed-variant": "#3a485b",
                    "primary-fixed-dim": "#b4c5ff",
                    "on-primary-container": "#eeefff",
                    "on-tertiary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "outline": "#737686",
                    "surface-dim": "#d9d9e5",
                    "on-tertiary-fixed": "#360f00",
                    "surface-tint": "#0053db",
                    "on-primary-fixed-variant": "#003ea8",
                    "on-secondary-container": "#57657a"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "md": "16px",
                    "margin": "24px",
                    "lg": "24px",
                    "gutter": "16px",
                    "sm": "8px",
                    "base": "4px",
                    "xs": "4px",
                    "xl": "32px"
            },
            "fontFamily": {
                    "body-sm": ["Inter"],
                    "display-lg": ["Inter"],
                    "title-sm": ["Inter"],
                    "body-md": ["Inter"],
                    "label-caps": ["Inter"],
                    "headline-md": ["Inter"],
                    "code-data": ["Inter"]
            },
            "fontSize": {
                    "body-sm": ["13px", { "lineHeight": "1.5", "fontWeight": "400" }],
                    "display-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                    "title-sm": ["18px", { "lineHeight": "1.4", "fontWeight": "600" }],
                    "body-md": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                    "label-caps": ["11px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700" }],
                    "headline-md": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                    "code-data": ["13px", { "lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "500" }]
            }
          }
        }
      }
    </script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-md sm:p-margin antialiased">
<!-- 
      Contextual Note: Navigation shell (SideNavBar/TopNavBar) is intentionally suppressed here 
      as this is a highly task-focused, linear data entry view (Add/Edit Form). 
      The user must complete or cancel the action before returning to the main dashboard.
    -->
<main class="w-full max-w-[640px]">
<!-- Form Container Level 1 Surface -->
<div class="bg-surface-container-lowest border border-surface-variant rounded-xl shadow-sm flex flex-col overflow-hidden">
<!-- Header -->
<header class="p-md sm:p-margin border-b border-surface-variant bg-surface flex items-center gap-md">
<button aria-label="Geri Dön" class="flex items-center justify-center w-[36px] h-[36px] rounded-full hover:bg-surface-variant text-on-surface-variant transition-colors group" type="button">
<span class="material-symbols-outlined text-[20px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
</button>
<div>
<h1 class="font-title-sm text-title-sm text-on-surface flex items-center gap-sm">
<span class="material-symbols-outlined text-primary text-[20px]">person_add</span>
                        Yeni Lead Ekle
                    </h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Operasyon veritabanına yeni bir personel adayı kaydedin.</p>
</div>
</header>
<!-- Form Content -->
<form action="#" class="p-md sm:p-margin flex flex-col gap-margin bg-surface-container-lowest" method="POST">
<!-- Ad Soyad Field (Validation Error State) -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-error" for="fullName">Ad Soyad</label>
<div class="relative">
<input aria-describedby="fullName-error" aria-invalid="true" class="w-full h-[40px] px-sm font-body-sm text-body-sm text-on-surface bg-error-container/10 border border-error rounded-lg focus:outline-none focus:ring-1 focus:ring-error focus:border-error transition-shadow placeholder:text-on-surface-variant/50" id="fullName" name="fullName" placeholder="Örn: Kpt. Ahmet Yılmaz" type="text" value=""/>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-error text-[20px] pointer-events-none icon-fill">error</span>
</div>
<p class="font-body-sm text-body-sm text-error flex items-start gap-xs mt-xs" id="fullName-error">
                        Lütfen ad ve soyad bilgisini eksiksiz giriniz.
                    </p>
</div>
<!-- Grid Row: Üs & Rol -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-md">
<!-- Üs (Base) Select -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="base">Bağlı Olacağı Üs</label>
<div class="relative">
<select class="w-full h-[40px] pl-sm pr-lg font-body-sm text-body-sm text-on-surface bg-surface border border-outline-variant rounded-lg appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow cursor-pointer" id="base" name="base">
<option disabled="" selected="" value="">Üs Seçiniz</option>
<option value="IST">IST - İstanbul Havalimanı</option>
<option value="SAW">SAW - Sabiha Gökçen</option>
<option value="ESB">ESB - Ankara Esenboğa</option>
<option value="AYT">AYT - Antalya Havalimanı</option>
</select>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px] pointer-events-none">expand_more</span>
</div>
</div>
<!-- Rol Select -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="role">Operasyonel Rol</label>
<div class="relative">
<select class="w-full h-[40px] pl-sm pr-lg font-body-sm text-body-sm text-on-surface bg-surface border border-outline-variant rounded-lg appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow cursor-pointer" id="role" name="role">
<option disabled="" selected="" value="">Rol Seçiniz</option>
<option value="captain">Kaptan Pilot</option>
<option value="first_officer">İkinci Pilot</option>
<option value="cabin_chief">Kabin Amiri</option>
<option value="dispatcher">Uçuş Harekat Uzmanı (Dispeçer)</option>
<option value="ground_ops">Yer İşletme Sorumlusu</option>
</select>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px] pointer-events-none">expand_more</span>
</div>
</div>
</div>
<!-- Durum Select -->
<div class="flex flex-col gap-xs w-full sm:w-1/2 sm:pr-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="status">Aday Durumu</label>
<div class="relative">
<select class="w-full h-[40px] pl-sm pr-lg font-body-sm text-body-sm text-on-surface bg-surface border border-outline-variant rounded-lg appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow cursor-pointer" id="status" name="status">
<option selected="" value="pending">Değerlendirme Bekliyor</option>
<option value="interview">Mülakat Aşamasında</option>
<option value="simulator">Simülatör Testinde</option>
<option value="approved">Onaylandı - Evrak Bekliyor</option>
<option value="rejected">Olumsuz Sonuçlandı</option>
</select>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px] pointer-events-none">expand_more</span>
</div>
</div>
<!-- Notlar Textarea -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant flex items-center justify-between" for="notes">
<span>Operasyonel Notlar</span>
<span class="text-outline font-normal">İsteğe Bağlı</span>
</label>
<textarea class="w-full p-sm font-body-sm text-body-sm text-on-surface bg-surface border border-outline-variant rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow resize-y min-h-[80px] placeholder:text-on-surface-variant/50" id="notes" name="notes" placeholder="Adayın lisans durumu, önceki uçuş saatleri veya mülakat notları..." rows="4"></textarea>
</div>
</form>
<!-- Footer Actions -->
<footer class="p-md sm:p-margin border-t border-surface-variant bg-surface flex flex-col-reverse sm:flex-row justify-end gap-sm sm:gap-md">
<button class="h-[40px] px-lg rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-sm text-body-sm font-medium hover:bg-surface-variant hover:text-on-surface transition-colors w-full sm:w-auto" type="button">
                    İptal
                </button>
<button class="h-[40px] px-lg rounded-lg bg-primary text-on-primary font-body-sm text-body-sm font-medium hover:bg-on-primary-fixed-variant transition-colors flex items-center justify-center gap-xs w-full sm:w-auto shadow-sm" type="submit">
<span class="material-symbols-outlined text-[18px]">save</span>
                    Kaydet
                </button>
</footer>
</div>
</main>
</body></html>
